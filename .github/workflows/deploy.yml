name: Deploy Infra and App

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1   # must match Terraform S3 backend region

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Build 1: Lambda Layer (Python dependencies) ──────────────────────
      # Packages are installed into /tmp/python/ inside the container.
      # Lambda extracts layers to /opt/; Python finds packages at /opt/python/.
      # This zip only needs to be re-uploaded when requirements.txt changes.
      - name: Build Lambda Layer (Python dependencies)
        run: |
          set -e
          mkdir -p dist
          docker run --rm \
            -v "$PWD/backend":/app \
            -v "$PWD/dist":/out \
            -w /app \
            public.ecr.aws/sam/build-python3.9:latest \
            /bin/sh -lc "
              set -e
              python3 -m pip install --upgrade pip --quiet
              python3 -m pip install \
                --only-binary=:all: \
                --no-compile \
                --quiet \
                -r requirements.txt \
                -t /tmp/python
              cd /tmp
              zip -r /out/layer.zip python -x '*.pyc' -x '*/__pycache__/*'
            "

      # ── Build 2: Lambda function code (application only) ─────────────────
      # Only source files — no site-packages.
      # Typically < 1 MB; fast to upload and deploy.
      - name: Build Lambda function code
        run: |
          set -e
          docker run --rm \
            -v "$PWD/backend":/app \
            -v "$PWD/dist":/out \
            -w /app \
            public.ecr.aws/sam/build-python3.9:latest \
            /bin/sh -lc "
              set -e
              mkdir -p /tmp/code
              cp -r utils main.py lambda_handler.py /tmp/code/
              cd /tmp/code
              zip -r /out/lambda.zip . \
                -x '*.pyc' \
                -x '*/__pycache__/*' \
                -x '.env' \
                -x 'README.md'
            "

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      # ── Terraform Apply ───────────────────────────────────────────────────
      # All required variables are supplied via -var flags.
      # No interactive prompts; -auto-approve ensures non-blocking CI.
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var "environment=testing" \
            -var "lambda_zip_path=../dist/lambda.zip" \
            -var "lambda_layer_zip_path=../dist/layer.zip"

      - name: Export API URL output
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw lambda_function_url)" >> $GITHUB_OUTPUT

      # ── Build frontend against the live API URL ───────────────────────────
      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ steps.tf_outputs.outputs.api_url }}
          CI: "false"
        run: |
          npm install
          npm run build

      # ── Deploy frontend to S3 and invalidate CloudFront ──────────────────
      - name: Upload frontend to S3 and invalidate CloudFront
        working-directory: terraform
        run: |
          BUCKET=$(terraform output -raw s3_bucket_name)
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws s3 sync ../frontend/build s3://$BUCKET --delete
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
